services:
  mysql:
    image: mysql:8.4
    container_name: kakeibo-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kakeibo}
      MYSQL_USER: ${MYSQL_USER:-kakeibo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kakeibo_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kakeibo-backend
    working_dir: /app/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      TZ: Asia/Tokyo
      BACKEND_CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-kakeibo}:${MYSQL_PASSWORD:-kakeibo_password}@mysql:3306/${MYSQL_DATABASE:-kakeibo}
      INTEGRATION_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-kakeibo}:${MYSQL_PASSWORD:-kakeibo_password}@mysql:3306/kakeibo_integration
      INTEGRATION_ADMIN_DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root_password}@mysql:3306/mysql
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local-env-at-least-32-bytes}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-5}
      COOKIE_SECURE: "false"
      CSRF_TOKEN_EXPIRE_MINUTES: ${CSRF_TOKEN_EXPIRE_MINUTES:-30}
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:-change-me-before-bootstrap}
      UPLOAD_STORAGE_ROOT: /app/storage/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: kakeibo-frontend
    working_dir: /app/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_AUTH_GUARD_ENABLED: ${NEXT_PUBLIC_AUTH_GUARD_ENABLED:-false}
      AUTH_GUARD_ENABLED: ${AUTH_GUARD_ENABLED:-false}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      - frontend-node-modules:/app/frontend/node_modules
      - frontend-next:/app/frontend/.next
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

  e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile.e2e
    profiles:
      - test
    working_dir: /app/frontend
    environment:
      E2E_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-kakeibo}:${MYSQL_PASSWORD:-kakeibo_password}@mysql:3306/kakeibo_e2e
      E2E_ADMIN_DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root_password}@mysql:3306/mysql
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      - ./storage:/app/storage
      - frontend-node-modules:/app/frontend/node_modules
      - frontend-next:/app/frontend/.next
    depends_on:
      mysql:
        condition: service_healthy
    command: npm run test:e2e

  secret-scan:
    image: zricethezav/gitleaks:v8.24.2
    working_dir: /repo
    volumes:
      - .:/repo:ro

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles:
      - security
    working_dir: /zap/wrk
    environment:
      ZAP_BACKEND_BASE_URL: http://backend:8000
      ZAP_TARGET_OPENAPI_URL: http://backend:8000/openapi.json
      ZAP_REPORT_DIR: /zap/wrk
      ZAP_CSRF_HEADER_NAME: X-CSRF-Token
      ZAP_LOGIN_EMAIL: sample@example.com
      ZAP_LOGIN_PASSWORD: SamplePassw0rd!
    volumes:
      - ./scripts/security:/zap/scripts/security:ro
      - ./zap-reports:/zap/wrk
    depends_on:
      - backend
    command: /bin/sh /zap/scripts/security/zap-api-scan.sh

volumes:
  mysql-data:
  frontend-node-modules:
  frontend-next:
