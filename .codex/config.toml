# .codex/config.toml
# Project-scoped Codex config.
# Canonical project rules and documentation live in AGENTS.md and docs/.

# Use the repository-root agent instructions for project-specific guidance.
project_doc_fallback_filenames = ["AGENTS.md"]

# Treat this repository as a project root for local Codex sessions.
project_root_markers = ["README.md", "docker-compose.yml", "backend/pyproject.toml", "frontend/package.json"]

# Conservative defaults for local development in this repo.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[windows]
sandbox = "elevated"
