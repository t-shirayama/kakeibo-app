name: ci

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      full_run: ${{ steps.detect.outputs.full_run }}
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      e2e_changed: ${{ steps.detect.outputs.e2e_changed }}
      common_static_changed: ${{ steps.detect.outputs.common_static_changed }}

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 変更範囲を判定
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          full_run=false
          if [ "$EVENT_NAME" = "push" ] && { [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "develop" ]; }; then
            full_run=true
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            case "$PR_HEAD_REF" in
              feature/*|features/*) full_run=false ;;
              *) full_run=true ;;
            esac
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            changed_files="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          elif [ -n "$PUSH_BEFORE" ] && [ "$PUSH_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only "$PUSH_BEFORE" "$PUSH_SHA")"
          else
            changed_files="$(git ls-files)"
          fi

          has_changed() {
            local pattern="$1"
            printf '%s\n' "$changed_files" | grep -Eq "$pattern"
          }

          backend_changed=false
          frontend_changed=false
          e2e_changed=false
          common_static_changed=false

          if has_changed '^(backend/|docker-compose\.yml$)'; then
            backend_changed=true
          fi

          if has_changed '^(frontend/|package\.json$|docker-compose\.yml$)'; then
            frontend_changed=true
          fi

          if has_changed '^(frontend/e2e/|frontend/playwright\.config\.ts$|frontend/Dockerfile\.e2e$|docker-compose\.yml$)'; then
            e2e_changed=true
          fi

          if has_changed '^(docs/|README\.md$|\.codex/|\.github/)'; then
            common_static_changed=true
          fi

          {
            echo "full_run=$full_run"
            echo "backend_changed=$backend_changed"
            echo "frontend_changed=$frontend_changed"
            echo "e2e_changed=$e2e_changed"
            echo "common_static_changed=$common_static_changed"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### CI change detection"
            echo ""
            echo "- full_run: $full_run"
            echo "- backend_changed: $backend_changed"
            echo "- frontend_changed: $frontend_changed"
            echo "- e2e_changed: $e2e_changed"
            echo "- common_static_changed: $common_static_changed"
          } >> "$GITHUB_STEP_SUMMARY"

  repo-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.common_static_changed == 'true'
    timeout-minutes: 15

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: ripgrepをインストール
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: ドキュメント未確定事項チェック
        shell: bash
        run: |
          matches="$(rg "確認事項|未決定事項|TODO|TBD|要確認" docs .codex -g "*.md" -g "*.toml" | rg -v 'rg "確認事項.*docs \.codex -g "\*\.md" -g "\*\.toml"' || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "未確定事項が残っています。"
            exit 1
          fi

      - name: シークレットスキャン
        run: docker compose run --rm --no-deps secret-scan git /repo --no-banner --redact

  backend-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.common_static_changed == 'true'
    timeout-minutes: 30

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Backend layer dependency check
        run: docker compose run --rm --no-deps backend python -m pytest tests/unit/application/test_layer_dependencies.py

      - name: Alembic適用確認 (migration smoke)
        run: docker compose run --rm backend python -m alembic upgrade head

      - name: OpenAPI client is up to date
        run: docker compose run --rm --no-deps backend python scripts/generate_openapi_client.py --check

      - name: Backend lock file is up to date
        run: docker compose run --rm --no-deps backend python scripts/generate_requirements_lock.py --check

  frontend-check:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.frontend_changed == 'true' || needs.changes.outputs.common_static_changed == 'true'
    timeout-minutes: 30

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Frontend lint
        run: docker compose run --rm --no-deps frontend npm run lint

      - name: Frontend typecheck
        run: docker compose run --rm --no-deps frontend npm run typecheck

      - name: Frontend build
        run: docker compose run --rm --no-deps frontend npm run build

  backend-unit:
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-check
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.backend_changed == 'true'
    timeout-minutes: 20

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Backend unit
        run: docker compose run --rm --no-deps backend python -m pytest tests/unit --cov=app --cov-report=term-missing

  frontend-unit:
    runs-on: ubuntu-latest
    needs:
      - changes
      - frontend-check
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.frontend_changed == 'true'
    timeout-minutes: 20

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Frontend unit
        run: docker compose run --rm --no-deps frontend npm run test:unit

  backend-integration:
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-unit
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.backend_changed == 'true'
    timeout-minutes: 30

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Backend integration
        run: docker compose run --rm backend python -m pytest -m integration

  frontend-integration:
    runs-on: ubuntu-latest
    needs:
      - changes
      - frontend-unit
    if: needs.changes.outputs.full_run == 'true' || needs.changes.outputs.frontend_changed == 'true'
    timeout-minutes: 20

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Frontend integration
        run: docker compose run --rm --no-deps frontend npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-integration
      - frontend-integration
    if: |
      always() &&
      (
        needs.changes.outputs.full_run == 'true' ||
        needs.changes.outputs.backend_changed == 'true' ||
        needs.changes.outputs.frontend_changed == 'true' ||
        needs.changes.outputs.e2e_changed == 'true'
      ) &&
      (
        needs.changes.outputs.full_run != 'true' ||
        (
          needs.backend-integration.result == 'success' &&
          needs.frontend-integration.result == 'success'
        )
      ) &&
      (
        needs.changes.outputs.backend_changed != 'true' ||
        needs.backend-integration.result == 'success'
      ) &&
      (
        needs.changes.outputs.frontend_changed != 'true' ||
        needs.frontend-integration.result == 'success'
      )
    timeout-minutes: 45

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: E2E
        run: docker compose run --rm e2e
