name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v6

      - name: Alembic適用確認
        run: docker compose run --rm backend python -m alembic upgrade head

      - name: Backend unit
        run: docker compose run --rm --no-deps backend python -m pytest tests/unit

      - name: Backend integration
        run: docker compose run --rm backend python -m pytest -m integration

      - name: Frontend unit
        run: docker compose run --rm --no-deps frontend npm run test:unit

      - name: Frontend integration
        run: docker compose run --rm --no-deps frontend npm run test:integration

      - name: E2E
        run: docker compose run --rm e2e
