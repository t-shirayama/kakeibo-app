name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Alembic適用確認
        run: docker compose run --rm backend python -m alembic upgrade head

      - name: Backend pytest
        run: docker compose run --rm backend python -m pytest

      - name: E2E
        run: docker compose run --rm e2e
