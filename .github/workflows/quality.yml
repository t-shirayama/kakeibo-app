name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: ripgrepをインストール
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Frontend lint
        run: docker compose run --rm --no-deps frontend npm run lint

      - name: Frontend typecheck
        run: docker compose run --rm --no-deps frontend npm run typecheck

      - name: Backend layer dependency check
        run: docker compose run --rm backend python -m pytest tests/application/test_layer_dependencies.py

      - name: ドキュメント未確定事項チェック
        shell: bash
        run: |
          matches="$(rg "確認事項|未決定事項|TODO|TBD|要確認" docs .codex -g "*.md" -g "*.toml" | rg -v 'rg "確認事項\|未決定事項\|TODO\|TBD\|要確認" docs \.codex -g "\*\.md" -g "\*\.toml"' || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "未確定事項が残っています。"
            exit 1
          fi

      - name: シークレットスキャン
        run: docker compose run --rm --no-deps secret-scan git /repo --no-banner --redact

      - name: Frontend build
        run: docker compose run --rm --no-deps frontend npm run build

      - name: OpenAPI client is up to date
        run: docker compose run --rm backend python scripts/generate_openapi_client.py --check
